<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>bubl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['system-ui', '-apple-system', 'Segoe UI', 'sans-serif'],
            body: ['system-ui', '-apple-system', 'Segoe UI', 'sans-serif'],
            kid: ['Fredoka', 'system-ui', 'sans-serif'],
            stage: ['Bungee', 'Fredoka', 'system-ui', 'sans-serif'],
          },
          colors: {
            speller: {
              cream: '#FFFDF8',
              sky: '#7DD3FC',
              mint: '#6EE7B7',
              coral: '#FDA4AF',
              ink: '#1E293B',
              lilac: '#C4B5FD',
            },
          },
          boxShadow: {
            soft: '0 8px 32px rgba(30, 41, 59, 0.08)',
            lift: '0 12px 40px rgba(30, 41, 59, 0.12)',
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="style.css?v=41" />
</head>
<body class="min-h-dvh min-h-[100svh] bg-speller-cream font-body text-speller-ink antialiased selection:bg-speller-sky/40">
  <div
    id="app"
    class="mx-auto flex h-dvh max-h-dvh w-full max-w-[min(100rem,calc(100vw-1rem))] flex-col overflow-hidden py-2 pl-[max(0.75rem,env(safe-area-inset-left,0px))] pr-[max(0.75rem,env(safe-area-inset-right,0px))] sm:px-6 sm:py-3 md:max-w-[min(100rem,calc(100vw-1.5rem))] md:px-10 md:py-4 lg:px-14 lg:py-5"
  >
    <!-- Setup -->
    <section id="screen-setup" class="flex flex-1 flex-col items-center justify-center gap-8 overflow-y-auto overscroll-contain py-2 sm:gap-10" aria-label="Teacher setup">
      <div class="flex max-w-[min(100%,24rem)] flex-col items-center gap-2 px-2 sm:gap-2.5">
        <img
          src="images/bubl-mascot.png?v=5"
          width="545"
          height="717"
          class="bubl-mascot-bounce h-[clamp(11rem,42vmin,16rem)] w-auto max-w-[min(20rem,88vw)] select-none object-contain object-top sm:h-[clamp(12.5rem,40vmin,18rem)]"
          alt="Bubl mascot"
          draggable="false"
        />
        <h1
          class="font-kid text-center text-5xl font-extrabold tracking-tight sm:text-7xl md:text-8xl"
          aria-label="bubl"
        >
          <span class="text-neutral-900">b</span><span class="text-sky-500">u</span><span class="text-neutral-900">b</span><span class="text-neutral-900">l</span>
        </h1>
      </div>
      <div class="w-full max-w-md space-y-6">
        <label class="block text-center text-xl font-bold text-slate-600 sm:text-2xl" for="suffix-input">
          Enter suffix <span class="font-normal text-slate-400">(e.g. an)</span>
        </label>
        <input
          id="suffix-input"
          type="text"
          inputmode="text"
          autocomplete="off"
          maxlength="12"
          placeholder="an"
          class="h-16 w-full rounded-2xl border-2 border-slate-200 bg-white px-6 text-center text-3xl font-bold uppercase shadow-soft outline-none transition focus:border-sky-400 focus:ring-4 focus:ring-sky-200 sm:h-20 sm:text-4xl"
        />
        <p id="setup-error" class="hidden text-center text-lg font-semibold text-rose-500" role="alert"></p>
        <button
          type="button"
          id="btn-start"
          class="h-16 w-full rounded-2xl bg-gradient-to-r from-sky-400 to-cyan-400 text-xl font-extrabold text-white shadow-lift transition hover:brightness-105 active:scale-[0.98] sm:h-20 sm:text-2xl"
        >
          Start
        </button>
      </div>
    </section>

    <!-- Short mascot beat before phase 1 / phase 2 -->
    <section
      id="screen-stage-intro"
      class="relative z-20 hidden flex flex-1 flex-col items-center justify-center gap-3 overflow-y-auto overscroll-contain px-4 py-6"
      aria-label="Stage intro"
      hidden
    >
      <h2
        id="stage-intro-title"
        class="text-center font-stage text-[clamp(2.25rem,10vmin,4rem)] font-normal leading-none tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-violet-600 via-fuchsia-500 to-sky-500 drop-shadow-sm"
      >
        STAGE 1
      </h2>
      <div
        class="stage-intro-mascot-row mt-1 flex w-full max-w-[min(36rem,96vw)] flex-row flex-wrap items-end justify-center gap-3 sm:gap-5"
      >
        <img
          src="images/bubl-mascot.png?v=5"
          width="545"
          height="717"
          class="bubl-mascot-bounce h-[clamp(9.5rem,34vmin,14rem)] w-auto max-w-[min(14rem,42vw)] shrink-0 select-none object-contain object-bottom sm:h-[clamp(10.5rem,32vmin,15.5rem)] sm:max-w-[min(15rem,40vw)]"
          alt=""
          draggable="false"
        />
        <div class="flex min-w-0 max-w-[min(17.5rem,88vw)] flex-1 flex-col items-stretch gap-3 sm:max-w-[min(19rem,52%)]">
          <div
            id="stage-intro-bubble"
            class="stage-intro-bubble relative z-10 text-left"
            role="note"
          >
            <span
              id="stage-intro-bubble-text"
              class="font-kid text-[clamp(1.05rem,4vmin,1.35rem)] font-bold leading-snug text-speller-ink"
            >
              Press GO when you are ready.
            </span>
          </div>
          <button
            type="button"
            id="btn-stage-intro-go"
            class="h-14 w-full rounded-2xl bg-gradient-to-r from-emerald-500 to-green-500 text-xl font-extrabold text-white shadow-lift transition hover:brightness-105 active:scale-[0.98] sm:h-16 sm:text-2xl"
            aria-describedby="stage-intro-bubble-text"
          >
            GO
          </button>
        </div>
      </div>
    </section>

    <!-- Phase 1: drag “an” onto each picture + first letter -->
    <section
      id="screen-phase1"
      class="relative z-0 hidden min-h-0 flex-1 flex-col overflow-hidden overscroll-none"
      aria-label="Phase 1 drag suffix"
      hidden
    >
      <div class="phase1-scale-outer">
        <div class="phase1-scale-inner">
          <header
            class="phase1-header relative z-10 flex shrink-0 flex-col items-center gap-1 px-2 pb-0.5 text-center"
          >
            <p id="phase1-instruction-title" class="phase1-instruction-title font-kid"></p>
            <p id="phase1-instruction" class="phase1-instruction-line" aria-label="Suffix letters"></p>
          </header>
          <div
            id="phase1-grid"
            class="relative z-10 grid min-h-0 w-full min-w-0 flex-1 grid-cols-5 gap-[clamp(0.2rem,1vmin,0.65rem)] [grid-template-rows:minmax(0,1fr)]"
          ></div>
          <div class="phase1-tray relative z-10 shrink-0 border-t border-slate-200/70 pt-[clamp(0.5rem,2vmin,1.1rem)]">
            <div
              id="phase1-bank"
              class="grid w-full min-w-0 grid-cols-5 gap-[clamp(0.2rem,1vmin,0.65rem)] [grid-template-columns:repeat(5,minmax(0,1fr))]"
            ></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Phase 2: drag/tap first letter into box beside suffix; sign cards visible -->
    <section
      id="screen-phase2"
      class="hidden min-h-0 flex-1 flex-col gap-2 overflow-y-auto overflow-x-hidden overscroll-contain sm:gap-3"
      aria-label="Stage 3 first letter"
      hidden
    >
      <header class="flex shrink-0 flex-col items-center gap-1">
        <p class="text-xs font-bold uppercase tracking-wide text-violet-600 sm:text-sm">Stage 3 of 4</p>
      </header>
      <div
        id="phase2-image-wrap"
        class="phase2-image-3d-wrap mx-auto my-2 aspect-square w-[min(52vw,14rem)] shrink-0 overflow-hidden rounded-2xl bg-slate-100 shadow-soft sm:my-3 sm:w-[min(48vw,16rem)] md:w-[min(40vw,18rem)]"
      >
        <img id="phase2-image" class="phase2-word-photo h-full w-full object-cover" src="" alt="" />
      </div>
      <div
        class="mx-auto w-full max-w-md shrink-0 overflow-x-hidden overflow-y-visible rounded-2xl bg-white p-2 shadow-soft sm:max-w-lg sm:p-2.5"
      >
        <header
          class="phase2-panel-header mb-1 flex shrink-0 flex-col items-center gap-0.5 px-1 text-center sm:mb-1.5 sm:gap-1"
        >
          <p id="phase2-instruction-title" class="phase2-instruction-title font-kid"></p>
          <p id="phase2-instruction" class="phase2-instruction-line" aria-label="Suffix letters"></p>
        </header>
        <div
          id="phase2-word-build"
          class="flex flex-wrap content-start items-start justify-center gap-1.5 overflow-x-hidden overflow-y-visible py-2 sm:gap-2 sm:py-2.5"
        ></div>
        <div id="phase2-word-print" class="mt-0.5 flex flex-wrap items-center justify-center sm:mt-1"></div>
      </div>
      <div
        id="phase2-letter-picks"
        class="mx-auto hidden w-full max-w-xl flex-row flex-wrap items-center justify-center gap-2 pt-3 sm:gap-3 sm:pt-4"
        role="group"
      ></div>
    </section>

    <!-- Lesson -->
    <section
      id="screen-lesson"
      class="hidden min-h-0 flex-1 flex-col gap-2 overflow-y-auto overflow-x-hidden overscroll-contain sm:gap-3"
      aria-label="Stage 4 lesson"
      hidden
    >
      <header class="flex shrink-0 flex-col items-center gap-1">
        <p class="text-xs font-bold uppercase tracking-wide text-violet-600 sm:text-sm">Stage 4 of 4</p>
        <div id="progress-dots" class="flex gap-2 sm:gap-3" role="status" aria-live="polite"></div>
        <p class="text-base font-bold text-slate-500 sm:text-lg">Word <span id="word-num">1</span> of 5</p>
      </header>

      <div id="suffix-banner" class="shrink-0 rounded-2xl bg-gradient-to-br from-violet-100 to-fuchsia-100 py-3 text-center shadow-soft sm:rounded-3xl sm:py-4 md:py-5">
        <p class="text-xs font-bold uppercase tracking-widest text-violet-600/80 sm:text-sm">Focus</p>
        <p id="suffix-display" class="font-display mt-0.5 text-4xl font-black leading-none text-violet-700 sm:text-5xl md:text-6xl lg:text-7xl" aria-live="polite"></p>
      </div>

      <div id="teacher-panel" class="hidden overflow-hidden rounded-3xl bg-slate-100 shadow-soft">
        <div class="aspect-video w-full bg-slate-200">
          <video id="teacher-video" class="h-full w-full object-cover" controls playsinline preload="metadata"></video>
        </div>
      </div>

      <div
        class="flex min-h-0 min-w-0 max-h-[min(42dvh,50svh)] flex-1 flex-col rounded-2xl bg-white p-2 shadow-soft sm:max-h-[min(44dvh,52svh)] sm:rounded-3xl sm:p-3 md:p-4"
      >
        <p class="mb-1 shrink-0 text-center text-sm font-bold text-slate-500 sm:mb-1.5 sm:text-base">Box · handshape · box</p>
        <div
          id="word-build"
          class="flex min-h-0 flex-1 flex-wrap content-start items-start justify-center gap-3 overflow-y-auto overflow-x-hidden sm:gap-4 md:gap-5"
        ></div>
      </div>

      <div class="mt-auto shrink-0 rounded-2xl bg-white p-2 pb-3 shadow-soft sm:rounded-3xl sm:p-3 md:p-4">
        <p class="mb-1.5 shrink-0 text-center text-sm font-bold text-slate-500 sm:mb-2 sm:text-base">Pick two pictures</p>
        <div
          id="image-grid"
          class="picture-row w-full gap-2 sm:gap-3 md:gap-4"
          role="group"
          aria-label="Picture choices"
        ></div>
      </div>
    </section>

    <!-- Celebration -->
    <section id="screen-done" class="hidden flex-1 flex-col items-center justify-center gap-10 overflow-y-auto overscroll-contain py-4 text-center" aria-label="Well done" hidden>
      <div class="celebrate-burst text-8xl sm:text-9xl" aria-hidden="true">✨</div>
      <h2 class="font-display text-4xl font-black text-speller-ink sm:text-6xl">Well done!</h2>
      <p class="max-w-md text-xl font-semibold text-slate-600 sm:text-2xl">You finished all five words.</p>
      <button
        type="button"
        id="btn-again"
        class="h-16 min-w-[12rem] rounded-2xl bg-gradient-to-r from-emerald-400 to-teal-400 px-10 text-xl font-extrabold text-white shadow-lift transition hover:brightness-105 active:scale-[0.98] sm:h-20 sm:text-2xl"
      >
        Start again
      </button>
    </section>

    <footer
      class="shrink-0 px-2 pb-[max(0.35rem,env(safe-area-inset-bottom,0px))] pt-2 text-center text-[0.7rem] leading-snug text-slate-400 sm:text-xs md:text-sm"
      role="contentinfo"
    >
      © Nic Comino 2026. All rights reserved.
    </footer>
  </div>

  <script src="script.js?v=47"></script>
</body>
</html>
