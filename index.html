<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Speller</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['system-ui', '-apple-system', 'Segoe UI', 'sans-serif'],
            body: ['system-ui', '-apple-system', 'Segoe UI', 'sans-serif'],
          },
          colors: {
            speller: {
              cream: '#FFFDF8',
              sky: '#7DD3FC',
              mint: '#6EE7B7',
              coral: '#FDA4AF',
              ink: '#1E293B',
              lilac: '#C4B5FD',
            },
          },
          boxShadow: {
            soft: '0 8px 32px rgba(30, 41, 59, 0.08)',
            lift: '0 12px 40px rgba(30, 41, 59, 0.12)',
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-dvh min-h-[100svh] bg-speller-cream font-body text-speller-ink antialiased selection:bg-speller-sky/40">
  <div
    id="app"
    class="mx-auto flex h-dvh max-h-dvh w-full max-w-[min(100rem,calc(100vw-1rem))] flex-col overflow-hidden py-2 pl-[max(0.75rem,env(safe-area-inset-left,0px))] pr-[max(0.75rem,env(safe-area-inset-right,0px))] sm:px-6 sm:py-3 md:max-w-[min(100rem,calc(100vw-1.5rem))] md:px-10 md:py-4 lg:px-14 lg:py-5"
  >
    <!-- Setup -->
    <section id="screen-setup" class="flex flex-1 flex-col items-center justify-center gap-10 overflow-y-auto overscroll-contain py-2" aria-label="Teacher setup">
      <h1 class="font-display text-5xl font-black tracking-tight text-speller-ink sm:text-7xl md:text-8xl">
        Sp<span class="text-sky-500">e</span>ller
      </h1>
      <div class="w-full max-w-md space-y-6">
        <label class="block text-center text-xl font-bold text-slate-600 sm:text-2xl" for="suffix-input">
          Enter suffix <span class="font-normal text-slate-400">(e.g. an)</span>
        </label>
        <input
          id="suffix-input"
          type="text"
          inputmode="text"
          autocomplete="off"
          maxlength="12"
          placeholder="an"
          class="h-16 w-full rounded-2xl border-2 border-slate-200 bg-white px-6 text-center text-3xl font-bold uppercase shadow-soft outline-none transition focus:border-sky-400 focus:ring-4 focus:ring-sky-200 sm:h-20 sm:text-4xl"
        />
        <p id="setup-error" class="hidden text-center text-lg font-semibold text-rose-500" role="alert"></p>
        <button
          type="button"
          id="btn-start"
          class="h-16 w-full rounded-2xl bg-gradient-to-r from-sky-400 to-cyan-400 text-xl font-extrabold text-white shadow-lift transition hover:brightness-105 active:scale-[0.98] sm:h-20 sm:text-2xl"
        >
          Start
        </button>
      </div>
    </section>

    <!-- Lesson -->
    <section
      id="screen-lesson"
      class="hidden min-h-0 flex-1 flex-col gap-2 overflow-y-auto overflow-x-hidden overscroll-contain sm:gap-3"
      aria-label="Lesson"
      hidden
    >
      <header class="flex shrink-0 flex-col items-center gap-1">
        <div id="progress-dots" class="flex gap-2 sm:gap-3" role="status" aria-live="polite"></div>
        <p class="text-base font-bold text-slate-500 sm:text-lg">Word <span id="word-num">1</span> of 5</p>
      </header>

      <div id="suffix-banner" class="shrink-0 rounded-2xl bg-gradient-to-br from-violet-100 to-fuchsia-100 py-3 text-center shadow-soft sm:rounded-3xl sm:py-4 md:py-5">
        <p class="text-xs font-bold uppercase tracking-widest text-violet-600/80 sm:text-sm">Focus</p>
        <p id="suffix-display" class="font-display mt-0.5 text-4xl font-black leading-none text-violet-700 sm:text-5xl md:text-6xl lg:text-7xl" aria-live="polite"></p>
      </div>

      <div id="teacher-panel" class="hidden overflow-hidden rounded-3xl bg-slate-100 shadow-soft">
        <div class="aspect-video w-full bg-slate-200">
          <video id="teacher-video" class="h-full w-full object-cover" controls playsinline preload="metadata"></video>
        </div>
      </div>

      <div
        class="flex min-h-0 min-w-0 max-h-[min(42dvh,50svh)] flex-1 flex-col rounded-2xl bg-white p-2 shadow-soft sm:max-h-[min(44dvh,52svh)] sm:rounded-3xl sm:p-3 md:p-4"
      >
        <p class="mb-1 shrink-0 text-center text-sm font-bold text-slate-500 sm:mb-1.5 sm:text-base">Box · handshape · box</p>
        <div
          id="word-build"
          class="flex min-h-0 flex-1 flex-wrap content-start items-start justify-center gap-3 overflow-y-auto overflow-x-hidden sm:gap-4 md:gap-5"
        ></div>
      </div>

      <div class="mt-auto shrink-0 rounded-2xl bg-white p-2 pb-3 shadow-soft sm:rounded-3xl sm:p-3 md:p-4">
        <p class="mb-1.5 shrink-0 text-center text-sm font-bold text-slate-500 sm:mb-2 sm:text-base">Pick two pictures</p>
        <div
          id="image-grid"
          class="picture-row w-full gap-2 sm:gap-3 md:gap-4"
          role="group"
          aria-label="Picture choices"
        ></div>
      </div>
    </section>

    <!-- Celebration -->
    <section id="screen-done" class="hidden flex-1 flex-col items-center justify-center gap-10 overflow-y-auto overscroll-contain py-4 text-center" aria-label="Well done" hidden>
      <div class="celebrate-burst text-8xl sm:text-9xl" aria-hidden="true">✨</div>
      <h2 class="font-display text-4xl font-black text-speller-ink sm:text-6xl">Well done!</h2>
      <p class="max-w-md text-xl font-semibold text-slate-600 sm:text-2xl">You finished all five words.</p>
      <button
        type="button"
        id="btn-again"
        class="h-16 min-w-[12rem] rounded-2xl bg-gradient-to-r from-emerald-400 to-teal-400 px-10 text-xl font-extrabold text-white shadow-lift transition hover:brightness-105 active:scale-[0.98] sm:h-20 sm:text-2xl"
      >
        Start again
      </button>
    </section>

    <footer
      class="shrink-0 px-2 pb-[max(0.35rem,env(safe-area-inset-bottom,0px))] pt-2 text-center text-[0.7rem] leading-snug text-slate-400 sm:text-xs md:text-sm"
      role="contentinfo"
    >
      © Nic Comino 2026. All rights reserved.
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
